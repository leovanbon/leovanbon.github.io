---
layout: default
---

{%-include back_link.html-%}

<div class="post-wrapper">
  <button id="toc-toggle" class="toc-toggle" aria-controls="post-toc" aria-expanded="false" title="Toggle table of contents">Contents</button>
  <article class="post-content">
    <p class="post-meta">
      <time datetime="{{ page.date }}">{{ page.date | date: site.theme_config.date_format }}</time>
    </p>
    
    <h1>{{ page.title }}</h1>

    {{ content }}
  </article>

  <nav id="post-toc" class="post-toc" aria-label="Table of contents">
    <button class="toc-close" aria-label="Close table of contents">×</button>
    <h3>Contents</h3>
    <ul></ul>
  </nav>
</div>

<script>
  // Build a client-side table of contents for headings inside the post
  (function(){
    try {
      var wrapper = document.querySelector('.post-wrapper');
      if (!wrapper) return;
      var content = wrapper.querySelector('.post-content');
      var toc = document.getElementById('post-toc');
      if (!content || !toc) return;
      // include h1 as some posts use h1 headings inside content
      var headings = content.querySelectorAll('h1, h2, h3, h4, h5, h6');
      if (!headings.length) {
        // keep the TOC visible but empty if no headings; hide it to avoid empty box
        toc.style.display = 'none';
        return;
      }
      var list = toc.querySelector('ul');
      var slugify = function(text){
        return text.toString().toLowerCase().trim()
          .replace(/[^a-z0-9\s-]/g, '')
          .replace(/\s+/g, '-')
          .replace(/-+/g, '-');
      };
      var used = {};
      headings.forEach(function(h){
        var text = h.textContent || h.innerText;
        var id = h.id || slugify(text);
        if (used[id]) {
          used[id]++;
          id = id + '-' + used[id];
        } else {
          used[id] = 1;
        }
        h.id = id;

        var li = document.createElement('li');
        li.className = 'toc-' + h.tagName.toLowerCase();
        var a = document.createElement('a');
        a.href = '#' + id;
        a.textContent = text;
        li.appendChild(a);
        list.appendChild(li);
      });
    } catch (e) {
      console.error('TOC build error', e);
    }
    
    // TOC toggle button behaviour
    try {
      var toggle = document.getElementById('toc-toggle');
      var tocEl = document.getElementById('post-toc');
      var closeBtn = tocEl && tocEl.querySelector('.toc-close');
      function openToc(){
        tocEl.classList.add('open');
        toggle.setAttribute('aria-expanded','true');
      }
      function closeToc(){
        tocEl.classList.remove('open');
        toggle.setAttribute('aria-expanded','false');
      }
      if (toggle && tocEl) {
        toggle.addEventListener('click', function(e){
          if (tocEl.classList.contains('open')) closeToc(); else openToc();
        });
        if (closeBtn) closeBtn.addEventListener('click', closeToc);
        // close on ESC
        document.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeToc(); });
        // click outside closes when in popup mode
        document.addEventListener('click', function(e){
          if (!tocEl.classList.contains('open')) return;
          if (tocEl.contains(e.target) || toggle.contains(e.target)) return;
          closeToc();
        });
      }
    } catch (e) { console.error('TOC toggle error', e); }
  })();
</script>
